# Alembic configuration for AI Job Hunter
# SQLite: sqlite:///./aijob.db
# PostgreSQL: postgresql://user:pass@host:5432/aijob

[alembic]
script_location = migrations
sqlalchemy.url = sqlite:///./aijob.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
